# =============================================================================
# financee.conf  —  Nginx site config (reverse proxy + static serving)
# -----------------------------------------------------------------------------
# THE PERMANENT STATIC-CACHE FIX lives in the two `location` blocks below.
#
#   * ManifestStaticFilesStorage renames every asset to <name>.<hash>.<ext>.
#     The hash is derived from the file CONTENT, so the URL changes whenever the
#     file changes. Such URLs are safe to cache FOREVER -> `immutable`.
#     A browser that has the old file simply requests a different URL after a
#     deploy; nothing stale is ever served, and no hard refresh is needed.
#
#   * Anything NOT hashed (defensive fallback: admin extras, third-party assets
#     that bypass the manifest) is given a short, revalidating cache so a change
#     is picked up within the hour at most.
#
#   * HTML responses from Django are NEVER cached by Nginx, so the page that
#     references the hashed asset names is always fresh.
# =============================================================================

upstream financee_app {
    server web:8000;          # docker-compose service name : Gunicorn port
    keepalive 32;
}

# Optional: HTTP -> HTTPS redirect. Enable once you have certs (e.g. certbot).
# server {
#     listen 80;
#     server_name your.domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;            # replace with your domain

    # --- upload size (invoices can carry many line items / serials) ----------
    client_max_body_size 25m;

    # --- compression ---------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript application/json
        application/xml image/svg+xml font/woff font/woff2;

    # --- security headers (baseline; tune CSP to your asset origins) ---------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HTTPS only

    # =========================================================================
    # STATIC FILES
    # =========================================================================
    location /static/ {
        alias /app/staticfiles/;          # shared volume populated by the image
        access_log off;

        # Hashed assets:  name.<12-hex>.ext  -> cache for a year, immutable.
        location ~* "\.[0-9a-f]{8,}\.(css|js|png|jpe?g|gif|svg|ico|woff2?|ttf|eot|map)$" {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Everything else under /static (non-hashed fallback): revalidate hourly.
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # Media (user uploads), if/when added.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # APPLICATION
    # =========================================================================
    location / {
        proxy_pass http://financee_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Lets Django know the original scheme so CSRF/secure cookies work.
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    65s;   # >= Gunicorn timeout so slow reports survive
    }
}
